version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: pulso-crm-db
    environment:
      POSTGRES_DB: pulso_crm_db
      POSTGRES_USER: pulso_user
      POSTGRES_PASSWORD: pulso_pass
    ports:
      - "5445:5432"
    volumes:
      - pulso_crm_pgdata_v2:/var/lib/postgresql/data

  backend:
    build: .
    container_name: pulso-crm-backend
    environment:
      DATABASE_URL: postgresql://pulso_user:pulso_pass@db:5432/pulso_crm_db
      JWT_SECRET_KEY: super-secret-pulso
      FLASK_DEBUG: "1"
    depends_on:
      - db
    ports:
      - "8085:8000"
    # opcional: para autoreload en dev, puedes montar tu código
    # volumes:
    #   - .:/app

volumes:
  pulso_crm_pgdata_v2:
